version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zara_app
    ports:
      - "8000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - USE_MARIADB=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=zara_password
      - DB_NAME=zara_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    container_name: zara_mariadb
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=zara_password
      - MYSQL_DATABASE=zara_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: zara_pma
    restart: always
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=zara_password
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mariadb_data:
