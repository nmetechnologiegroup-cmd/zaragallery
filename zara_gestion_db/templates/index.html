<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Base de Données Zara Gallerie (SQLite)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f4f4f5; margin: 0; padding: 20px; color: #18181b; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #09090b; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #e4e4e7; border-radius: 6px; font-family: monospace; font-size: 14px; margin-bottom: 12px; resize: vertical; box-sizing: border-box; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        button { padding: 8px 16px; background: #18181b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        button:hover { background: #27272a; }
        button.secondary { background: #e4e4e7; color: #18181b; }
        button.secondary:hover { background: #d4d4d8; }
        select { padding: 8px 12px; border: 1px solid #e4e4e7; border-radius: 6px; background: white; cursor: pointer; }
        .status { padding: 12px; border-radius: 6px; margin-bottom: 24px; display: none; font-weight: 500; }
        .status.success { background: #dcfce7; color: #166534; display: block; border: 1px solid #bbf7d0; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; border: 1px solid #fecaca; }
        .table-container { overflow-x: auto; background: white; border: 1px solid #e4e4e7; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th, td { padding: 12px 16px; border-bottom: 1px solid #e4e4e7; }
        th { background: #f8f8f9; font-weight: 600; color: #52525b; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zara Gallerie - Interface SQL</h1>
        <textarea id="sqlInput" placeholder="Écrivez votre requête SQL ici (ex: SELECT * FROM transactions LIMIT 10;)..."></textarea>
        
        <div class="controls">
            <button onclick="executeQuery()">Exécuter (Ctrl+Entrée)</button>
            <div style="flex: 1;"></div>
            <select id="exportFormat">
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
            </select>
            <button class="secondary" onclick="exportData()">Exporter</button>
            <button class="secondary" onclick="runVacuum()">Nettoyer (VACUUM)</button>
            <button class="secondary" onclick="runOptimize()">Optimiser (PRAGMA)</button>
        </div>

        <div id="statusMessage" class="status"></div>

        <div class="table-container">
            <table id="resultTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('sqlInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                executeQuery();
            }
        });

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status ' + (isError ? 'error' : 'success');
        }

        async function executeQuery() {
            const sql = document.getElementById('sqlInput').value.trim();
            if (!sql) return showStatus("Veuillez entrer une requête SQL", true);

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Erreur inconnue");

                if (data.rows && data.columns) {
                    renderTable(data.columns, data.rows);
                    showStatus(`Requête exécutée. ${data.rows.length} résultat(s).`);
                } else {
                    document.getElementById('tableHead').innerHTML = '';
                    document.getElementById('tableBody').innerHTML = '';
                    showStatus(data.message || "Requête exécutée avec succès.");
                }
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        function renderTable(columns, rows) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            thead.innerHTML = '<tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
            
            tbody.innerHTML = rows.map(row => {
                return '<tr>' + columns.map(c => {
                    let val = row[c];
                    if (val === null) val = 'NULL';
                    else if (typeof val === 'object') val = JSON.stringify(val);
                    
                    // XSS basic protection
                    const div = document.createElement('div');
                    div.textContent = val;
                    return `<td>${div.innerHTML}</td>`;
                }).join('') + '</tr>';
            }).join('');
        }

        async function exportData() {
            const sql = document.getElementById('sqlInput').value.trim();
            const format = document.getElementById('exportFormat').value;
            if (!sql) return showStatus("Veuillez entrer une requête SQL à exporter", true);

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql, format })
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || "Erreur lors de l'export");
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `zara_export.${format}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                showStatus("Export téléchargé.");
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        async function runVacuum() {
            try {
                const response = await fetch('/api/maintenance/vacuum', { method: 'POST' });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showStatus(data.message);
            } catch (err) {
                showStatus(err.message, true);
            }
        }

        async function runOptimize() {
            try {
                const response = await fetch('/api/maintenance/optimize', { method: 'POST' });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                showStatus(data.message);
            } catch (err) {
                showStatus(err.message, true);
            }
        }
    </script>
</body>
</html>
